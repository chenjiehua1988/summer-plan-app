<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="学习计划" />
  <meta name="theme-color" content="#4f7cff" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <title>学习计划</title>
</head>
<body>
  <!-- 顶部栏 -->
  <header class="topbar">
    <div class="topbar-left">
      <select id="childSwitcher" class="child-switcher" aria-label="切换孩子"></select>
    </div>
    <div class="topbar-center">
      <select id="planSwitcher" class="plan-switcher" aria-label="切换学习周期"></select>
      <div id="planCountdown" class="plan-countdown"></div>
    </div>
    <div class="topbar-right">
      <button id="btnPoints" class="chip" title="积分">⭐ <span id="pointBalance">0</span></button>
      <button id="btnLogoutTop" class="chip" title="退出登录" style="margin-left:4px">退出</button>
    </div>
  </header>

  <!-- 主内容区（各页面挂载点） -->
  <main id="view" class="view"></main>

  <!-- 底部导航 -->
  <nav class="tabbar">
    <button class="tab active" data-tab="today">📅<span>今日</span></button>
    <button class="tab" data-tab="verify">✅<span>验收</span></button>
    <button class="tab" data-tab="stats">📊<span>统计</span></button>
    <button class="tab" data-tab="life">🏃<span>生活</span></button>
    <button class="tab" data-tab="setup">⚙️<span>设置</span></button>
  </nav>

  <!-- 登录浮层（家庭密码版） -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <h1>学习计划</h1>
      <p class="auth-sub">家庭学习管理 · 爸妈与孩子共同使用</p>

      <div class="auth-tabbar">
        <button id="tabParent" class="auth-tab active">家长</button>
        <button id="tabChild" class="auth-tab">我是孩子</button>
      </div>

      <!-- 家长区 -->
      <div id="parentBox">
        <div class="auth-subtab">
          <button id="tabLogin" class="auth-subtab-btn active">登录</button>
          <button id="tabCreate" class="auth-subtab-btn">首次创建家庭</button>
        </div>
        <input id="familyName" type="text" placeholder="家庭名（如：张家）" />
        <input id="password" type="password" placeholder="家庭密码（至少 4 位）" />
        <div class="role-pick">你是：
          <select id="loginRole">
            <option value="妈妈">妈妈</option>
            <option value="爸爸">爸爸</option>
          </select>
        </div>
        <div id="createExtra" class="create-extra" style="display:none">
          <p class="auth-hint">创建家庭时角色仅用于本次登录，家人登录时各自选。</p>
        </div>
        <button id="btnLogin" class="btn-primary">登录</button>
        <button id="btnCreateFamily" class="btn-primary" style="display:none">创建家庭</button>
        <p class="auth-hint">家长角色登录后固定，不可切换。</p>
      </div>

      <!-- 孩子区 -->
      <div id="childBox" style="display:none">
        <input id="childFamilyName" type="text" placeholder="家庭名" />
        <button id="btnLoadKids" class="btn-ghost">查找家庭</button>
        <select id="childPick" style="display:none"></select>
        <button id="btnChildLogin" class="btn-primary" style="display:none">进入</button>
        <p class="auth-hint">孩子模式：只能打卡、拍照、申请兑换，不能改设置或验收。</p>
      </div>

      <p id="authMsg" class="auth-msg"></p>
    </div>
  </div>

  <!-- 通用提示条 -->
  <div id="toast" class="toast"></div>

  <!-- Supabase 客户端（ESM CDN） -->
  <script type="module" src="https://esm.sh/@supabase/supabase-js@2"></script>
  <!-- 业务脚本（模块化，依赖 supabase.js 导出 supabase） -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
